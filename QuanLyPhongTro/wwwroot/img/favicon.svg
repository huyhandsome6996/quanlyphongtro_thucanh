<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
  </defs>
  <!-- Building base -->
  <rect x="10" y="20" width="44" height="40" rx="3" fill="url(#bg)"/>
  <!-- Roof -->
  <polygon points="32,4 4,22 60,22" fill="#065f46"/>
  <!-- Windows -->
  <rect x="16" y="28" width="10" height="10" rx="2" fill="#d1fae5"/>
  <rect x="38" y="28" width="10" height="10" rx="2" fill="#d1fae5"/>
  <!-- Door -->
  <rect x="26" y="42" width="12" height="18" rx="2" fill="#a7f3d0"/>
  <!-- P letter on building -->
  <text x="32" y="54" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="11" fill="#065f46">P</text>
</svg>