<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Quản lý Phòng Trọ</title>
    <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo">
                <span class="logo-icon">🏢</span>
                <h1>Hệ thống Quản lý Phòng Trọ</h1>
                <p>Đăng nhập để tiếp tục</p>
            </div>
            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label for="txtUsername">Tên đăng nhập <span class="required">*</span></label>
                    <input type="text" id="txtUsername" class="form-control" placeholder="Nhập tên đăng nhập" required autofocus>
                </div>
                <div class="form-group">
                    <label for="txtPassword">Mật khẩu <span class="required">*</span></label>
                    <input type="password" id="txtPassword" class="form-control" placeholder="Nhập mật khẩu" required>
                </div>
                <div id="loginError" style="display:none; color:#ef4444; font-size:0.85rem; margin-bottom:12px; text-align:center;"></div>
                <button type="submit" id="btnLogin" class="btn btn-primary btn-block" style="padding:12px;">
                    🔐 Đăng nhập
                </button>
            </form>
            <div class="login-footer">
                © 2025 - Đồ án Quản lý phòng trọ
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/login.js"></script>
</body>
</html>
